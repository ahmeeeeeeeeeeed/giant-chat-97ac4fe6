name: Build Android APK

# يبني ملف APK تلقائيًا عند كل push إلى الفرع الرئيسي
# أو يدويًا من تبويب Actions في GitHub.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          check-latest: true

      - name: Verify Node version
        run: node -v

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Bump app version (patch)
        run: node scripts/bump-version.mjs patch

      - name: Build web app (SPA preset for Capacitor)
        # CAPACITOR_BUILD=1 switches vite.config.ts to nitro node-server preset
        # and enables TanStack Start's SPA prerender so dist/client/index.html
        # is a real hydratable HTML shell (not an empty body).
        env:
          CAPACITOR_BUILD: "1"
        run: npm run build

      - name: Verify Capacitor index.html
        run: node scripts/generate-capacitor-index.mjs

      - name: Verify Capacitor web assets
        run: |
          test -f dist/client/index.html || { echo "::error::dist/client/index.html missing"; exit 1; }
          test -d dist/client/assets || { echo "::error::dist/client/assets missing"; exit 1; }
          ls -la dist/client | head -20

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Patch AndroidManifest permissions
        run: node scripts/patch-android-permissions.mjs

      - name: Patch Android launcher icon
        run: node scripts/patch-android-icon.mjs

      - name: Patch Android version (code/name)
        run: node scripts/patch-android-version.mjs

      - name: Patch Android immersive navigation bar
        run: node scripts/patch-android-immersive.mjs

      - name: Grant gradlew permission
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: giant-app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
