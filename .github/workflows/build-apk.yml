name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          check-latest: true

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Bump app version for this build
        env:
          APP_VERSION_PATCH: ${{ github.run_number }}
        run: node scripts/bump-version.mjs patch

      - name: Build SPA for Capacitor
        env:
          CAPACITOR_BUILD: "1"
        run: npm run build

      - name: Verify build output exists
        run: |
          if [ ! -f dist/client/index.html ]; then
            echo "❌ dist/client/index.html missing — SPA prerender did not run"
            ls -R dist || true
            exit 1
          fi
          echo "✅ SPA build present:"
          ls -lah dist/client | head

      - name: Verify Node version
        run: node -v

      - name: Sync Capacitor assets into Android project
        run: npx cap sync android

      - name: Patch Android version (code/name)
        run: node scripts/patch-android-version.mjs

      - name: Confirm bundled media is inside APK assets
        run: |
          ASSET_DIR="android/app/src/main/assets/public/media"
          if [ -f "$ASSET_DIR/welcome-video.mp4" ]; then
            echo "✅ welcome-video.mp4 bundled ($(du -h "$ASSET_DIR/welcome-video.mp4" | cut -f1))"
          else
            echo "❌ welcome-video.mp4 NOT bundled"
            exit 1
          fi

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK (unsigned)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Sign APK with debug keystore (auto-installable, no Play Store)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # IMPORTANT: Android only accepts an APK update over an installed APK
          # when both APKs are signed with the same certificate. Provide
          # ANDROID_KEYSTORE_BASE64 + ANDROID_KEYSTORE_PASSWORD + ANDROID_KEY_ALIAS
          # (+ optional ANDROID_KEY_PASSWORD) as repository secrets for production.
          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ] && [ -n "${ANDROID_KEYSTORE_PASSWORD:-}" ] && [ -n "${ANDROID_KEY_ALIAS:-}" ]; then
            KEYSTORE=$HOME/giant-release.keystore
            # Strip any accidental whitespace/newlines that GitHub Secrets UI may have
            # introduced when the value was pasted, then decode.
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n\t ' | base64 -d > "$KEYSTORE"
            STOREPASS="$ANDROID_KEYSTORE_PASSWORD"
            KEYPASS="${ANDROID_KEY_PASSWORD:-$ANDROID_KEYSTORE_PASSWORD}"
            ALIAS="$ANDROID_KEY_ALIAS"
          else
            echo "❌ Missing Android signing secrets. Refusing to create an APK with a new random certificate because Android will reject it as a package error over installed versions."
            echo "Add ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, and optionally ANDROID_KEY_PASSWORD."
            exit 1
          fi

          echo "🔍 Keystore debug:"
          echo "  file size: $(wc -c < "$KEYSTORE") bytes"
          echo "  file type: $(file "$KEYSTORE")"
          echo "  alias requested: $ALIAS"

          echo "🔍 Verifying keystore can be opened with ANDROID_KEYSTORE_PASSWORD..."
          if ! keytool -list -keystore "$KEYSTORE" -storepass "$STOREPASS" > /tmp/ks-list.txt 2>&1; then
            echo "❌ Cannot open keystore with provided ANDROID_KEYSTORE_PASSWORD."
            echo "   This means either:"
            echo "   1) ANDROID_KEYSTORE_PASSWORD does not match the password used when the keystore was created, OR"
            echo "   2) ANDROID_KEYSTORE_BASE64 is truncated/corrupted (re-export with: base64 -w 0 giant-release.keystore)."
            sed 's/^/   /' /tmp/ks-list.txt
            exit 1
          fi
          echo "✅ Keystore opened successfully. Aliases inside keystore:"
          sed 's/^/   /' /tmp/ks-list.txt

          if ! grep -qi "^$ALIAS," /tmp/ks-list.txt && ! grep -qi "Alias name: $ALIAS$" /tmp/ks-list.txt; then
            echo "⚠️  ANDROID_KEY_ALIAS='$ALIAS' was not found in the keystore listing above."
            echo "   Update ANDROID_KEY_ALIAS to match one of the alias names printed above."
            exit 1
          fi

          echo "🔍 Verifying ANDROID_KEY_PASSWORD unlocks the private key for alias '$ALIAS'..."
          if ! keytool -list -keystore "$KEYSTORE" -storepass "$STOREPASS" -alias "$ALIAS" -keypass "$KEYPASS" > /dev/null 2>&1; then
            echo "❌ ANDROID_KEY_PASSWORD does not unlock the private key for alias '$ALIAS'."
            echo "   When the keystore was created, the key password may differ from the store password."
            echo "   Set ANDROID_KEY_PASSWORD to the correct key password (often the same as store password)."
            exit 1
          fi
          echo "✅ Key password is correct."

          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -n1)
          APKSIGNER="$BUILD_TOOLS/apksigner"
          ZIPALIGN="$BUILD_TOOLS/zipalign"
          UNSIGNED=android/app/build/outputs/apk/release/app-release-unsigned.apk
          ALIGNED=android/app/build/outputs/apk/release/app-release-aligned.apk
          SIGNED=android/app/build/outputs/apk/release/app-release.apk

          "$ZIPALIGN" -p 4 "$UNSIGNED" "$ALIGNED"
          "$APKSIGNER" sign \
            --ks "$KEYSTORE" \
            --ks-key-alias "$ALIAS" \
            --ks-pass "pass:$STOREPASS" \
            --key-pass "pass:$KEYPASS" \
            --out "$SIGNED" \
            "$ALIGNED"
          "$APKSIGNER" verify "$SIGNED"
          echo "✅ Signed APK ready: $SIGNED ($(du -h "$SIGNED" | cut -f1))"


      - name: Verify APK version before publishing
        run: |
          APK=android/app/build/outputs/apk/release/app-release.apk
          EXPECTED_VERSION=$(node -p "require('./package.json').version")
          EXPECTED_CODE=$(node -e "const v=require('./package.json').version.split('.').map(Number); console.log((v[0]||0)*10000+(v[1]||0)*100+(v[2]||0))")
          BADGING=$($ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -n1)/aapt dump badging "$APK" | head -n1)
          echo "$BADGING"
          if ! echo "$BADGING" | grep -q "versionName='$EXPECTED_VERSION'"; then
            echo "❌ APK versionName does not match package.json ($EXPECTED_VERSION)"
            exit 1
          fi
          if ! echo "$BADGING" | grep -q "versionCode='$EXPECTED_CODE'"; then
            echo "❌ APK versionCode does not match expected code ($EXPECTED_CODE)"
            exit 1
          fi

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Giant-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Publish APK update link
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          OTA_PUBLISH_SECRET: ${{ secrets.OTA_PUBLISH_SECRET }}
          OTA_ENDPOINT: https://giant-chat.lovable.app/api/public/ota-publish
          MSG: |-
            🚀 تحديث جديد متاح!

            ✨ ما الجديد في هذا التحديث:
            • تحسين آلية التحديث حتى يتعرّف التطبيق على الإصدار المثبت بعد التثبيت.
            • إصلاح مشكلة تكرار ظهور نافذة التحديث بعد تطبيق التحديث.
            • تحسين توافق ملف التثبيت مع الإصدارات القديمة مثل 1.0.65.
            • تحسينات عامة في الأداء والاستقرار وتجربة الاستخدام.

            📲 ننصح بالتحديث الآن للحصول على أحدث نسخة من التطبيق.
        run: |
          APK=android/app/build/outputs/apk/release/app-release.apk
          VERSION=$(node -p "require('./package.json').version")
          SHA256=$(sha256sum "$APK" | awk '{print $1}')
          TS=$(date +%s)
          SIG=$(printf '%s.apk.%s.%s' "$TS" "$VERSION" "$SHA256" | openssl dgst -sha256 -hmac "$OTA_PUBLISH_SECRET" | awk '{print $2}')
          MSG_B64=$(printf '%s' "$MSG" | base64 -w 0)
          echo "Publishing APK $VERSION ($SHA256)"
          curl -fsSL -X POST "$OTA_ENDPOINT" \
            -H "content-type: application/vnd.android.package-archive" \
            -H "x-ota-timestamp: $TS" \
            -H "x-ota-signature: $SIG" \
            -H "x-ota-apk-version: $VERSION" \
            -H "x-ota-sha256: $SHA256" \
            -H "x-ota-message-b64: $MSG_B64" \
            --data-binary @"$APK"

      - name: Create GitHub Release with APK (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Giant APK build #${{ github.run_number }}
          body: |
            🎉 Automated APK build from commit ${{ github.sha }}.

            **Install:** Download `app-release.apk` below, transfer to your Android phone, and open it.
            You may need to allow "Install from unknown sources" in Settings.

            Built from branch: `${{ github.ref_name }}`
          files: android/app/build/outputs/apk/release/app-release.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
