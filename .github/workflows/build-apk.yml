name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          check-latest: true

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Auto-bump app version from CI run number
        run: node scripts/bump-version.mjs patch
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: Show app version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "📌 Building version: $VERSION"





      - name: Build SPA for Capacitor
        env:
          CAPACITOR_BUILD: "1"
        run: npm run build

      - name: Verify build output exists
        run: |
          if [ ! -f dist/client/index.html ]; then
            echo "❌ dist/client/index.html missing — SPA prerender did not run"
            ls -R dist || true
            exit 1
          fi
          echo "✅ SPA build present:"
          ls -lah dist/client | head

      - name: Verify Node version
        run: node -v

      - name: Sync Capacitor assets into Android project
        run: npx cap sync android

      - name: Patch AndroidManifest permissions
        run: node scripts/patch-android-permissions.mjs

      - name: Patch Android version (code/name)
        run: node scripts/patch-android-version.mjs

      - name: Confirm bundled media is inside APK assets
        run: |
          ASSET_DIR="android/app/src/main/assets/public/media"
          if [ -f "$ASSET_DIR/welcome-video.mp4" ]; then
            echo "✅ welcome-video.mp4 bundled ($(du -h "$ASSET_DIR/welcome-video.mp4" | cut -f1))"
          else
            echo "❌ welcome-video.mp4 NOT bundled"
            exit 1
          fi

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK (unsigned)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Sign release APK
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GENERATE_NEW_KEYSTORE: ${{ vars.GENERATE_NEW_KEYSTORE }}
        run: |
          set -u
          KEYSTORE=$HOME/giant-release.keystore

          # ──────────────────────────────────────────────────────────────
          # One-time bootstrap: if signing secrets are missing (or the repo
          # variable GENERATE_NEW_KEYSTORE=1 is set), create a fresh valid
          # keystore inside the runner and print its Base64 + passwords so
          # they can be copied into GitHub Secrets. Once copied, future builds
          # reuse the same key and Android updates install normally.
          # ──────────────────────────────────────────────────────────────
          BOOTSTRAPPED_KEYSTORE=0
          if [ "${GENERATE_NEW_KEYSTORE:-0}" = "1" ] || [ -z "${ANDROID_KEYSTORE_BASE64:-}" ] || [ -z "${ANDROID_KEYSTORE_PASSWORD:-}" ] || [ -z "${ANDROID_KEY_ALIAS:-}" ]; then
            BOOTSTRAPPED_KEYSTORE=1
            if [ "${GENERATE_NEW_KEYSTORE:-0}" = "1" ]; then
              echo "⚠️  GENERATE_NEW_KEYSTORE=1 → generating a fresh keystore for bootstrap."
            else
              echo "⚠️  Android signing secrets are missing → generating a fresh keystore so this build can continue."
            fi
            STOREPASS="giant-$(openssl rand -hex 8)"
            KEYPASS="$STOREPASS"
            ALIAS="giant"
            keytool -genkeypair -v \
              -keystore "$KEYSTORE" -storetype PKCS12 \
              -storepass "$STOREPASS" -keypass "$KEYPASS" \
              -alias "$ALIAS" -keyalg RSA -keysize 2048 -validity 10950 \
              -dname "CN=Giant, OU=Mobile, O=Giant, L=NA, ST=NA, C=NA"
            echo ""
            echo "════════════════════════════════════════════════════════════"
            echo "  COPY THESE INTO GITHUB SECRETS, THEN UNSET THE VARIABLE"
            echo "  GENERATE_NEW_KEYSTORE BEFORE THE NEXT BUILD."
            echo "════════════════════════════════════════════════════════════"
            echo "ANDROID_KEY_ALIAS         = $ALIAS"
            echo "ANDROID_KEYSTORE_PASSWORD = $STOREPASS"
            echo "ANDROID_KEY_PASSWORD      = $KEYPASS"
            echo "ANDROID_KEYSTORE_BASE64 ↓ (single line between the markers)"
            echo "------------- BEGIN BASE64 -------------"
            base64 -w 0 "$KEYSTORE"; echo
            echo "-------------- END BASE64 --------------"
            echo "════════════════════════════════════════════════════════════"
          else
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n\t ' | base64 -d > "$KEYSTORE"
            STOREPASS="$ANDROID_KEYSTORE_PASSWORD"
            KEYPASS="${ANDROID_KEY_PASSWORD:-$ANDROID_KEYSTORE_PASSWORD}"
            ALIAS="$ANDROID_KEY_ALIAS"
          fi

          echo "🔍 Keystore debug:"
          echo "  file size : $(wc -c < "$KEYSTORE") bytes"
          echo "  file type : $(file "$KEYSTORE")"
          HEAD_HEX=$(xxd -p -l 4 "$KEYSTORE" | tr -d '\n')
          echo "  magic     : $HEAD_HEX"
          case "$HEAD_HEX" in
            feedfeed) echo "  detected  : JKS (Java KeyStore)" ;;
            3082*)    echo "  detected  : PKCS12 (DER-encoded)" ;;
            *)        echo "  detected  : UNKNOWN — file is probably not a Java keystore" ;;
          esac
          echo "  alias req : $ALIAS"

          # Try both storetypes with the provided store password to pinpoint
          # whether the password is wrong vs. the file format mismatches.
          OPENED_TYPE=""
          for TYPE in PKCS12 JKS; do
            echo "🔍 Trying -storetype $TYPE with ANDROID_KEYSTORE_PASSWORD..."
            if keytool -list -keystore "$KEYSTORE" -storetype "$TYPE" -storepass "$STOREPASS" > /tmp/ks-list.txt 2>&1; then
              OPENED_TYPE="$TYPE"
              echo "✅ Opened as $TYPE."
              break
            else
              echo "   ↳ failed as $TYPE (first lines):"
              sed 's/^/      /' /tmp/ks-list.txt | head -n 4
            fi
          done

          if [ -z "$OPENED_TYPE" ]; then
            echo ""
            echo "❌ keytool could not open the keystore as PKCS12 OR JKS with ANDROID_KEYSTORE_PASSWORD."
            echo "   Most likely cause: ANDROID_KEYSTORE_PASSWORD is wrong."
            echo "   Other possibilities: the Base64 was truncated, or the uploaded file is not a Java keystore."
            echo ""
            echo "👉 Fastest fix: set repository variable GENERATE_NEW_KEYSTORE=1 and re-run this workflow."
            echo "   It will print a brand-new valid keystore + passwords to paste into Secrets."
            exit 1
          fi

          echo "✅ Aliases inside keystore:"
          sed 's/^/   /' /tmp/ks-list.txt

          if ! grep -qi "^$ALIAS," /tmp/ks-list.txt && ! grep -qi "Alias name: $ALIAS$" /tmp/ks-list.txt; then
            echo "⚠️  ANDROID_KEY_ALIAS='$ALIAS' was not found in the keystore."
            echo "   Update ANDROID_KEY_ALIAS to match one of the aliases above."
            exit 1
          fi

          echo "🔍 Verifying ANDROID_KEY_PASSWORD unlocks alias '$ALIAS'..."
          if ! keytool -list -keystore "$KEYSTORE" -storetype "$OPENED_TYPE" -storepass "$STOREPASS" -alias "$ALIAS" -keypass "$KEYPASS" > /dev/null 2>&1; then
            echo "❌ ANDROID_KEY_PASSWORD does not unlock the private key for alias '$ALIAS'."
            echo "   Set ANDROID_KEY_PASSWORD correctly (often identical to the store password)."
            exit 1
          fi
          echo "✅ Key password is correct. Keystore type in use: $OPENED_TYPE."

          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -n1)
          APKSIGNER="$BUILD_TOOLS/apksigner"
          ZIPALIGN="$BUILD_TOOLS/zipalign"
          UNSIGNED=android/app/build/outputs/apk/release/app-release-unsigned.apk
          ALIGNED=android/app/build/outputs/apk/release/app-release-aligned.apk
          SIGNED=android/app/build/outputs/apk/release/app-release.apk

          "$ZIPALIGN" -p 4 "$UNSIGNED" "$ALIGNED"
          "$APKSIGNER" sign \
            --ks "$KEYSTORE" \
            --ks-type "$OPENED_TYPE" \
            --ks-key-alias "$ALIAS" \
            --ks-pass "pass:$STOREPASS" \
            --key-pass "pass:$KEYPASS" \
            --out "$SIGNED" \
            "$ALIGNED"
          "$APKSIGNER" verify "$SIGNED"
          echo "✅ Signed APK ready: $SIGNED ($(du -h "$SIGNED" | cut -f1))"

          if [ "$BOOTSTRAPPED_KEYSTORE" = "1" ]; then
            echo ""
            echo "⚠️  REMINDER: copy the Base64 + passwords above into GitHub Secrets,"
            echo "    and keep GENERATE_NEW_KEYSTORE unset/disabled after that."
            echo "    Otherwise future builds may use a different key and updates will fail."
          fi


      - name: Verify APK version before publishing
        run: |
          APK=android/app/build/outputs/apk/release/app-release.apk
          EXPECTED_VERSION=$(node -p "require('./package.json').version")
          EXPECTED_CODE=$(node -e "const v=require('./package.json').version.split('.').map(Number); console.log((v[0]||0)*10000+(v[1]||0)*100+(v[2]||0))")
          BADGING=$($ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -n1)/aapt dump badging "$APK" | head -n1)
          echo "$BADGING"
          if ! echo "$BADGING" | grep -q "versionName='$EXPECTED_VERSION'"; then
            echo "❌ APK versionName does not match package.json ($EXPECTED_VERSION)"
            exit 1
          fi
          if ! echo "$BADGING" | grep -q "versionCode='$EXPECTED_CODE'"; then
            echo "❌ APK versionCode does not match expected code ($EXPECTED_CODE)"
            exit 1
          fi

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Giant-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Publish APK update link
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          OTA_PUBLISH_SECRET: ${{ secrets.OTA_PUBLISH_SECRET }}
          OTA_ENDPOINT: https://giant-chat.lovable.app/api/public/ota-publish
          MSG: |-
            🚀 تحديث جديد متاح!

            ✨ ما الجديد في هذا التحديث:
            • تحسين آلية التحديث حتى يتعرّف التطبيق على الإصدار المثبت بعد التثبيت.
            • إصلاح مشكلة تكرار ظهور نافذة التحديث بعد تطبيق التحديث.
            • تحسين توافق ملف التثبيت مع الإصدارات القديمة مثل 1.0.65.
            • تحسينات عامة في الأداء والاستقرار وتجربة الاستخدام.

            📲 ننصح بالتحديث الآن للحصول على أحدث نسخة من التطبيق.
        run: |
          APK=android/app/build/outputs/apk/release/app-release.apk
          VERSION=$(node -p "require('./package.json').version")
          SHA256=$(sha256sum "$APK" | awk '{print $1}')
          TS=$(date +%s)
          SIG=$(printf '%s.apk.%s.%s' "$TS" "$VERSION" "$SHA256" | openssl dgst -sha256 -hmac "$OTA_PUBLISH_SECRET" | awk '{print $2}')
          MSG_B64=$(printf '%s' "$MSG" | base64 -w 0)
          echo "Publishing APK $VERSION ($SHA256)"
          curl -fsSL -X POST "$OTA_ENDPOINT" \
            -H "content-type: application/vnd.android.package-archive" \
            -H "x-ota-timestamp: $TS" \
            -H "x-ota-signature: $SIG" \
            -H "x-ota-apk-version: $VERSION" \
            -H "x-ota-sha256: $SHA256" \
            -H "x-ota-message-b64: $MSG_B64" \
            --data-binary @"$APK"

      - name: Create GitHub Release with APK (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Giant APK build #${{ github.run_number }}
          body: |
            🎉 Automated APK build from commit ${{ github.sha }}.

            **Install:** Download `app-release.apk` below, transfer to your Android phone, and open it.
            You may need to allow "Install from unknown sources" in Settings.

            Built from branch: `${{ github.ref_name }}`
          files: android/app/build/outputs/apk/release/app-release.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
