name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          check-latest: true

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Use current app version
        run: node -e "const p=require('./package.json'); console.log('Building app version', p.version)"

      - name: Build SPA for Capacitor
        env:
          CAPACITOR_BUILD: "1"
        run: npm run build

      - name: Verify build output exists
        run: |
          if [ ! -f dist/client/index.html ]; then
            echo "❌ dist/client/index.html missing — SPA prerender did not run"
            ls -R dist || true
            exit 1
          fi
          echo "✅ SPA build present:"
          ls -lah dist/client | head

      - name: Verify Node version
        run: node -v

      - name: Sync Capacitor assets into Android project
        run: npx cap sync android

      - name: Patch Android version (code/name)
        run: node scripts/patch-android-version.mjs

      - name: Confirm bundled media is inside APK assets
        run: |
          ASSET_DIR="android/app/src/main/assets/public/media"
          if [ -f "$ASSET_DIR/welcome-video.mp4" ]; then
            echo "✅ welcome-video.mp4 bundled ($(du -h "$ASSET_DIR/welcome-video.mp4" | cut -f1))"
          else
            echo "❌ welcome-video.mp4 NOT bundled"
            exit 1
          fi

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK (unsigned)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Sign APK with debug keystore (auto-installable, no Play Store)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # IMPORTANT: Android only accepts an APK update over an installed APK
          # when both APKs are signed with the same certificate. Provide
          # ANDROID_KEYSTORE_BASE64 + ANDROID_KEYSTORE_PASSWORD + ANDROID_KEY_ALIAS
          # (+ optional ANDROID_KEY_PASSWORD) as repository secrets for production.
          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ] && [ -n "${ANDROID_KEYSTORE_PASSWORD:-}" ] && [ -n "${ANDROID_KEY_ALIAS:-}" ]; then
            KEYSTORE=$HOME/giant-release.keystore
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE"
            STOREPASS="$ANDROID_KEYSTORE_PASSWORD"
            KEYPASS="${ANDROID_KEY_PASSWORD:-$ANDROID_KEYSTORE_PASSWORD}"
            ALIAS="$ANDROID_KEY_ALIAS"
          else
            echo "❌ Missing Android signing secrets. Refusing to create an APK with a new random certificate because Android will reject it as a package error over installed versions."
            echo "Add ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, and optionally ANDROID_KEY_PASSWORD."
            exit 1
          fi

          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -n1)
          APKSIGNER="$BUILD_TOOLS/apksigner"
          ZIPALIGN="$BUILD_TOOLS/zipalign"
          UNSIGNED=android/app/build/outputs/apk/release/app-release-unsigned.apk
          ALIGNED=android/app/build/outputs/apk/release/app-release-aligned.apk
          SIGNED=android/app/build/outputs/apk/release/app-release.apk

          "$ZIPALIGN" -p 4 "$UNSIGNED" "$ALIGNED"
          "$APKSIGNER" sign \
            --ks "$KEYSTORE" \
            --ks-key-alias "$ALIAS" \
            --ks-pass "pass:$STOREPASS" \
            --key-pass "pass:$KEYPASS" \
            --out "$SIGNED" \
            "$ALIGNED"
          "$APKSIGNER" verify "$SIGNED"
          echo "✅ Signed APK ready: $SIGNED ($(du -h "$SIGNED" | cut -f1))"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Giant-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Publish APK update link
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          OTA_PUBLISH_SECRET: ${{ secrets.OTA_PUBLISH_SECRET }}
          OTA_ENDPOINT: https://giant-chat.lovable.app/api/public/ota-publish
          VERSION: 11.0.0
          MSG: |-
            🚀 تحديث جديد متاح!

            ✨ ما الجديد في هذا التحديث:
            • تحسين آلية التحديث حتى يتعرّف التطبيق على الإصدار المثبت بعد التثبيت.
            • إصلاح مشكلة تكرار ظهور نافذة التحديث بعد تطبيق التحديث.
            • تحسين توافق ملف التثبيت مع الإصدارات القديمة مثل 1.0.65.
            • تحسينات عامة في الأداء والاستقرار وتجربة الاستخدام.

            📲 ننصح بالتحديث الآن للحصول على أحدث نسخة من التطبيق.
        run: |
          APK=android/app/build/outputs/apk/release/app-release.apk
          SHA256=$(sha256sum "$APK" | awk '{print $1}')
          TS=$(date +%s)
          SIG=$(printf '%s.apk.%s.%s' "$TS" "$VERSION" "$SHA256" | openssl dgst -sha256 -hmac "$OTA_PUBLISH_SECRET" | awk '{print $2}')
          MSG_B64=$(printf '%s' "$MSG" | base64 -w 0)
          echo "Publishing APK $VERSION ($SHA256)"
          curl -fsSL -X POST "$OTA_ENDPOINT" \
            -H "content-type: application/vnd.android.package-archive" \
            -H "x-ota-timestamp: $TS" \
            -H "x-ota-signature: $SIG" \
            -H "x-ota-apk-version: $VERSION" \
            -H "x-ota-sha256: $SHA256" \
            -H "x-ota-message-b64: $MSG_B64" \
            --data-binary @"$APK"

      - name: Create GitHub Release with APK (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Giant APK build #${{ github.run_number }}
          body: |
            🎉 Automated APK build from commit ${{ github.sha }}.

            **Install:** Download `app-release.apk` below, transfer to your Android phone, and open it.
            You may need to allow "Install from unknown sources" in Settings.

            Built from branch: `${{ github.ref_name }}`
          files: android/app/build/outputs/apk/release/app-release.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
